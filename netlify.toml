[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# Las rutas /api/* son Netlify Functions (SSR server-side)
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

# Caché agresivo para assets estáticos con hash
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
